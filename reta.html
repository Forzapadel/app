<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Únete a la Reta — Forza Padel</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #000;
      color: #fff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      background: #111;
      border-radius: 24px;
      padding: 40px 32px;
      max-width: 380px;
      width: 100%;
      text-align: center;
      border: 1px solid #222;
    }
    .logo { font-size: 48px; margin-bottom: 16px; }
    h1 { font-size: 24px; font-weight: 800; color: #0b59d5; margin-bottom: 8px; }
    .subtitle { font-size: 13px; color: #666; margin-bottom: 24px; }
    .info-box {
      background: #1a1a1a;
      border-radius: 14px;
      padding: 20px;
      margin-bottom: 28px;
      text-align: left;
      border: 1px solid #222;
    }
    .info-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; font-size: 14px; color: #ccc; }
    .info-row:last-child { margin-bottom: 0; }
    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 16px 24px;
      border-radius: 14px;
      text-decoration: none;
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 12px;
    }
    .btn-primary { background: #0b59d5; color: #fff; }
    .btn-ios { background: #1a1a1a; color: #fff; border: 1px solid #333; }
    .btn-android { background: #1a1a1a; color: #fff; border: 1px solid #333; }
    .divider { height: 1px; background: #222; margin: 20px 0; }
    .small { font-size: 12px; color: #555; margin-top: 16px; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">🎾</div>
    <h1>¡Únete a la Reta!</h1>
    <p class="subtitle">Forza Padel — Zona de Retas</p>

    <div class="info-box" id="retaInfo">
      <div class="info-row"><span>📍</span><span id="club">Cargando...</span></div>
      <div class="info-row"><span>🏟️</span><span id="cancha">—</span></div>
      <div class="info-row"><span>📅</span><span id="fecha">—</span></div>
      <div class="info-row"><span>⏰</span><span id="hora">—</span></div>
      <div class="info-row"><span>🏆</span><span id="categoria">—</span></div>
    </div>

    <a href="forza-padel://zona-retas" class="btn btn-primary" id="openApp">
      <span>📱</span> Abrir en la App
    </a>

    <div class="divider"></div>
    <p style="font-size:13px; color:#aaa; margin-bottom:16px;">¿No tienes la app? Descárgala gratis</p>

    <a href="https://apps.apple.com/app/id6767002951" class="btn btn-ios">
      <span>🍎</span> App Store (iPhone)
    </a>

    <a href="https://play.google.com/store/apps/details?id=com.cdp.forzapadel" class="btn btn-android">
      <span>🤖</span> Google Play (Android)
    </a>

    <p class="small">Liga de Padel · Hermosillo, Sonora</p>
  </div>

  <script>
    // Leer parámetros de la URL
    const params = new URLSearchParams(window.location.search);
    const club = params.get('club');
    const cancha = params.get('cancha');
    const fecha = params.get('fecha');
    const hora = params.get('hora');
    const categoria = params.get('categoria');

    if (club) document.getElementById('club').textContent = club;
    if (cancha) document.getElementById('cancha').textContent = cancha;
    if (fecha) document.getElementById('fecha').textContent = fecha;
    if (hora) document.getElementById('hora').textContent = hora;
    if (categoria) document.getElementById('categoria').textContent = categoria;

    // Intentar abrir la app automáticamente
    const start = Date.now();
    window.location.href = 'forza-padel://zona-retas';

    setTimeout(function() {
      if (Date.now() - start < 2500) {
        document.getElementById('openApp').style.display = 'none';
      }
    }, 2000);
  </script>
</body>
</html>
